    /* ── SIDEBAR ────────────────────────────────────────────────────── */
    function Sidebar({ active, setActive, dark, activeCount = 0, donePct = 0 }) {
      const [expanded, setExpanded] = useState({ atividades: true, calendario: true });

      const toggleExpand = (key) => {
        setExpanded(prev => ({ ...prev, [key]: !prev[key] }));
      };

      const isActiveParent = (item) => {
        if (item.sub) return item.sub.some(s => s.key === active);
        return active === item.key;
      };

      return (

                      color: isActive ? "#3B82F6" : dark ? "#9CA3AF" : "#4B5563",
                    }}
                    onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = dark ? "#1C1E27" : "#F7F8FC"; }}
                    onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = "transparent"; }}>
                    <Icon name={item.icon} size={17} strokeWidth={2} />

                    {hasSub && (
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                        className="transition-transform duration-200"
                        style={{ transform: isExpanded ? 'rotate(90deg)' : 'rotate(0deg)', opacity: 0.5 }}>

                              background: isSubActive ? (dark ? "rgba(59,130,246,0.12)" : "#EFF4FF") : "transparent",
                              color: isSubActive ? "#3B82F6" : dark ? "#6B7280" : "#9CA3AF",
                            }}
                            onMouseEnter={e => { if (!isSubActive) e.currentTarget.style.background = dark ? "#1C1E27" : "#F7F8FC"; }}
                            onMouseLeave={e => { if (!isSubActive) e.currentTarget.style.background = "transparent"; }}>
                            {sub.label}
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </nav>
          <div className={`m-3 p-3.5 rounded-2xl ${dark ? "bg-gray-800/50" : "bg-gray-50"}`}>

    /* ── HEADER ─────────────────────────────────────────────────────── */

          <div className="flex items-center gap-1.5 text-[13px]">

              <React.Fragment key={c}>

          </div>
          <div className="flex items-center gap-3">
            <div className="relative">
              <Icon name="search" size={15} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400" />
              <input placeholder="Pesquisar projetos, tarefas, clientes..."
                value={searchVal} onChange={handleSearch}
                className="pl-10 pr-4 py-2 w-72 rounded-full text-[13px] outline-none transition-all focus:w-80"
                style={{ background: dark ? "#1C1E27" : "#F3F4F6", color: dark ? "#E5E7EB" : "#222" }} />
            </div>
            <button onClick={onNewActivity} className="flex items-center gap-1.5 px-4 py-2 rounded-full bg-blue-500 text-white text-[13px] font-semibold hover:bg-blue-600 transition-all active:scale-[0.97] shadow-[0_4px_14px_rgba(59,130,246,0.35)]">
              <Icon name="plus" size={15} strokeWidth={2.5} /> {isProjetos ? 'Novo Projeto' : 'Nova Atividade'}
            </button>
            <button onClick={() => setDark(!dark)}
              className={`w-9 h-9 rounded-full flex items-center justify-center transition-colors ${dark ? "bg-gray-800 text-yellow-500" : "bg-gray-100 text-gray-600"}`}>
              <Icon name={dark ? "sun" : "moon"} size={16} />
            </button>
            <div className="relative">
              <button onClick={() => setNotifOpen(o => !o)}

                <div className="absolute right-0 mt-2 w-80 bg-white rounded-2xl shadow-xl border border-gray-100 z-20 overflow-hidden" style={{ animation: 'fadeSlide .15s ease' }}>
                  <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                    <span className="font-semibold text-[13.5px] text-gray-900">Notificações</span>
                    <span className="text-[11px] text-blue-500 font-medium">{NOTIFICATIONS.filter(n => !n.read).length} não lidas</span>
                  </div>
                  <div className="max-h-64 overflow-y-auto">
                    {NOTIFICATIONS.length > 0 ? NOTIFICATIONS.map((n, i) => (

            </div>

    /* ── BOARDS (Monday-style table) ────────────────────────────────── */

      const filteredRows = searchQuery
        ? rows.filter(r => r.name.toLowerCase().includes(searchQuery) || r.tags.some(t => t.toLowerCase().includes(searchQuery)) || r.status.toLowerCase().includes(searchQuery))
        : rows;
      return (
        <div className="rounded-2xl overflow-hidden" style={{ background: dark ? "#1A1C25" : "#FFFFFF", boxShadow: "0 2px 12px rgba(20,20,43,0.05)" }}>
          <div className="flex items-center justify-between px-6 py-4 border-b" style={{ borderColor: dark ? "#22242E" : "#F0F1F5" }}>
            <div className="flex items-center gap-2.5">
              <span className="w-2.5 h-2.5 rounded-full bg-blue-500" />
              <h3 className={`font-semibold text-[15px] ${dark ? "text-white" : "text-gray-900"}`}>Lista de Atividades</h3>
            </div>
            <button className="text-[12.5px] text-blue-500 font-medium flex items-center gap-1 hover:underline"><Icon name="plus" size={14} /> Adicionar item</button>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full border-collapse">
              <thead>
                <tr style={{ background: dark ? "#15171F" : "#FAFBFD" }}>
                  {cols.map(c => <th key={c} className="text-left px-4 py-3 text-[11.5px] font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">{c}</th>)}

              <tbody>
                {filteredRows.map(row => (
                  <tr key={row.id} className="group border-t transition-colors" style={{ borderColor: dark ? "#22242E" : "#F3F4F7" }}

                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                    <td className="px-4 py-4 min-w-[220px]"><span className={`text-[13.5px] font-medium ${dark ? "text-white" : "text-gray-900"}`}>{row.name}</span></td>

                    <td className="px-4 py-4 text-[12.5px] text-gray-500 whitespace-nowrap">{row.date}</td>
                    <td className="px-4 py-4"><PriorityStars level={row.priority} /></td>
                    <td className="px-4 py-4"><div className="flex gap-1.5 flex-wrap max-w-[140px]">{row.tags.map(t => <Tag key={t}>{t}</Tag>)}</div></td>

                    <td className="px-4 py-4"><span className="flex items-center gap-1.5 text-[12.5px] text-gray-500"><Icon name="paperclip" size={13} />{row.files}</span></td>

            </table>
          </div>
        </div>

    /* ── KANBAN ─────────────────────────────────────────────────────── */
    function KanbanCard({ card, dark, onDragStart }) {
      const [done, total] = card.checklist;
      return (
        <div draggable onDragStart={e => onDragStart(e, card.id)}
          className="rounded-[14px] p-4 mb-3 cursor-grab active:cursor-grabbing transition-all hover:-translate-y-0.5"
          style={{ background: dark ? "#1F212C" : "#FFFFFF", boxShadow: "0 2px 8px rgba(20,20,43,0.06)" }}>
          <div className="flex items-start justify-between gap-2 mb-1.5">
            <p className={`text-[13.5px] font-semibold leading-snug ${dark ? "text-white" : "text-gray-900"}`}>{card.title}</p>
            <Icon name="more-horizontal" size={15} className="text-gray-400 shrink-0" />
          </div>
          <p className="text-[12px] text-gray-400 leading-snug mb-3 line-clamp-2">{card.desc}</p>
          <div className="flex items-center gap-2 mb-3">
            <div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
              <div className="h-full rounded-full bg-blue-500" style={{ width: `${total ? (done / total) * 100 : 0}%` }} />
            </div>
            <span className="text-[10.5px] text-gray-400 font-medium">{done}/{total}</span>
          </div>
          <div className="flex items-center justify-between">
            <AvatarStack ids={card.owners} />

              <span className="flex items-center gap-1 text-[11px]"><Icon name="message-square" size={12} />{card.comments}</span>
              <span className="flex items-center gap-1 text-[11px]"><Icon name="paperclip" size={12} />{card.files}</span>
              <span className="flex items-center gap-1 text-[11px]"><Icon name="clock" size={12} />{card.time}</span>
            </div>
          </div>
        </div>
      );
    }

    function Kanban({ dark, searchQuery = '' }) {
      const [cards, setCards] = useState(initialCards);
      const dragId = useRef(null);
      const onDragStart = (e, id) => { dragId.current = id; };
      const onDrop = (e, colKey) => { e.preventDefault(); setCards(cs => cs.map(c => c.id === dragId.current ? { ...c, col: colKey } : c)); };

      const filteredCards = searchQuery
        ? cards.filter(c => c.title.toLowerCase().includes(searchQuery) || c.desc.toLowerCase().includes(searchQuery))
        : cards;
      return (
        <div className="flex gap-5 overflow-x-auto pb-4" style={{ minHeight: "70vh" }}>
          {KANBAN_COLUMNS.map(col => {
            const colCards = filteredCards.filter(c => c.col === col.key);
            return (
              <div key={col.key} onDragOver={e => e.preventDefault()} onDrop={e => onDrop(e, col.key)}
                className="w-[290px] shrink-0 rounded-2xl p-3.5" style={{ background: dark ? "#15171F" : "#F7F8FC" }}>
                <div className="flex items-center justify-between px-1.5 mb-3">
                  <div className="flex items-center gap-2">
                    <span className="w-2 h-2 rounded-full" style={{ background: col.color }} />
                    <span className={`text-[13px] font-semibold ${dark ? "text-white" : "text-gray-900"}`}>{col.label}</span>
                    <span className="text-[11px] text-gray-400 font-medium bg-gray-200/60 px-1.5 py-0.5 rounded-md">{colCards.length}</span>
                  </div>
                  <Icon name="plus" size={15} className="text-gray-400 cursor-pointer hover:text-blue-500 transition-colors" />
                </div>
                {colCards.map(card => <KanbanCard key={card.id} card={card} dark={dark} onDragStart={onDragStart} />)}
              </div>
            );
          })}
        </div>
      );
    }

          <div className="px-6 py-4 border-b flex items-center justify-between" style={{ borderColor: dark ? "#22242E" : "#F0F1F5" }}>
            <div className="flex items-center gap-2.5">
              <Icon name="calendar-clock" size={18} className="text-blue-500" />

            <div className="flex items-center gap-2">
              {[
                { l: "Concluído", c: "#22C55E" }, { l: "Em andamento", c: "#3B82F6" },

              {GANTT_DATA.map((row, i) => (
                <div key={row.id} className="h-12 px-4 flex items-center gap-3 border-t transition-colors"
                  style={{ borderColor: dark ? "#22242E" : "#F3F4F7", background: hoveredRow === i ? (dark ? "#1F212C" : "#FAFBFD") : "transparent" }}

    /* ── CALENDÁRIO EDITORIAL ───────────────────────────────────────── */

      { id: 'ig', name: 'Instagram', color: '#E1306C' },
      { id: 'fb', name: 'Facebook', color: '#1877F2' },
      { id: 'li', name: 'LinkedIn', color: '#0A66C2' },
      { id: 'blog', name: 'WordPress', color: '#21759B' },

    function PlatformLogo({ id, size = 16, rounded = false }) {

    let editorialIdCounter = 100;
    const EDITORIAL_POSTS = [
      { id: 1, date: "2026-07-02", time: "10:00", title: "Post Instagram - Lançamento Q3", desc: "Carrossel com fotos do novo produto.", platforms: ['ig'], status: "publicado", publishedAt: "2026-07-02T10:00:00" },
      { id: 2, date: "2026-07-02", time: "14:00", title: "Artigo Blog - Tendências Tech", desc: "Post longo sobre IA e automação.", platforms: ['blog'], status: "publicado", publishedAt: "2026-07-02T14:00:00" },
      { id: 3, date: "2026-07-05", time: "09:00", title: "Post LinkedIn - Case de sucesso", desc: "Case do cliente X com resultados.", platforms: ['li'], status: "agendado" },
      { id: 4, date: "2026-07-08", time: "11:00", title: "Reel - Bastidores do projeto", desc: "Vídeo curto mostrando o processo.", platforms: ['ig', 'fb'], status: "agendado" },
      { id: 5, date: "2026-07-10", time: "08:30", title: "Story - Enquete produtos", desc: "Enquete interativa sobre preferências.", platforms: ['ig'], status: "rascunho" },
      { id: 6, date: "2026-07-12", time: "10:00", title: "Artigo Blog - SEO avançado", desc: "Guia completo de SEO para 2026.", platforms: ['blog'], status: "rascunho" },
      { id: 7, date: "2026-07-15", time: "15:00", title: "Post Facebook - Promoção", desc: "Promoção de verão com desconto.", platforms: ['fb', 'ig'], status: "agendado" },
      { id: 8, date: "2026-07-18", time: "09:00", title: "Post LinkedIn - Vaga aberta", desc: "Divulgação de vaga de dev.", platforms: ['li'], status: "rascunho" },
      { id: 9, date: "2026-07-22", time: "12:00", title: "Post Instagram - Dica rápida", desc: "Carousel de 5 dicas práticas.", platforms: ['ig'], status: "agendado" },
      { id: 10, date: "2026-07-25", time: "10:00", title: "Artigo Blog - Review produto", desc: "Review completo do produto Y.", platforms: ['blog', 'li'], status: "rascunho" },
    ];

    const MONTHS_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

    function Calendario({ dark }) {
      const [calDate, setCalDate] = useState(new Date(2026, 6, 1));
      const [selectedDay, setSelectedDay] = useState(null);
      const [posts, setPosts] = useState(EDITORIAL_POSTS);
      const [showPostModal, setShowPostModal] = useState(false);
      const [editingPost, setEditingPost] = useState(null);
      const [filterStatus, setFilterStatus] = useState('todos');

      const y = calDate.getFullYear(), m = calDate.getMonth();
      const firstDay = new Date(y, m, 1).getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const daysInPrev = new Date(y, m, 0).getDate();
      const today = new Date().toISOString().split('T')[0];

      const filteredPosts = filterStatus === 'todos' ? posts : posts.filter(p => p.status === filterStatus);

      const days = [];
      for (let i = firstDay - 1; i >= 0; i--) days.push({ day: daysInPrev - i, other: true });
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const dayPosts = filteredPosts.filter(p => p.date === dateStr);
        days.push({ day: d, date: dateStr, posts: dayPosts, isToday: dateStr === today });
      }
      const remaining = 42 - days.length;
      for (let d = 1; d <= remaining; d++) days.push({ day: d, other: true });

      const selectedPosts = selectedDay ? filteredPosts.filter(p => p.date === selectedDay) : [];

      const publishPost = (post) => {
        setPosts(prev => prev.map(p => p.id === post.id ? { ...p, status: 'publicando' } : p));
        // Simula publicação (em produção, chamaria n8n webhook)
        setTimeout(() => {
          setPosts(prev => prev.map(p => p.id === post.id ? { ...p, status: 'publicado', publishedAt: new Date().toISOString() } : p));
        }, 2000);
      };

      const savePost = (form) => {
        if (editingPost) {
          setPosts(prev => prev.map(p => p.id === editingPost.id ? { ...p, ...form } : p));
        } else {
          const newPost = { id: ++editorialIdCounter, ...form, status: 'rascunho' };
          setPosts(prev => [...prev, newPost]);
        }
        setShowPostModal(false);
        setEditingPost(null);
      };

      const deletePost = (id) => {
        setPosts(prev => prev.filter(p => p.id !== id));
      };

      // Stats
      const stats = {
        total: posts.length,
        agendados: posts.filter(p => p.status === 'agendado').length,

                    {Object.entries(POST_STATUS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                  </select>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={() => setCalDate(new Date(y, m - 1, 1))} className="p-2 rounded-lg hover:bg-gray-100 transition"><Icon name="chevron-left" size={16} className="text-gray-500" /></button>

                  <button onClick={() => { setEditingPost(null); setShowPostModal(true); }} className="ml-2 px-3 py-1.5 rounded-lg bg-blue-500 text-white text-[11px] font-bold hover:bg-blue-600 transition flex items-center gap-1"><Icon name="plus" size={13} /> Novo Post</button>

              </div>

              <div className="grid grid-cols-7 border-b" style={{ borderColor: dark ? "#22242E" : "#F0F1F5" }}>

                  <div key={d} className="py-2 text-center text-[10px] font-bold text-gray-400 uppercase tracking-widest">{d}</div>
                ))}
              </div>

              <div className="grid grid-cols-7">
                {days.map((d, i) => {
                  const hasPosts = d.posts && d.posts.length > 0;
                  const isSelected = selectedDay === d.date;
                  return (
                    <div key={i} onClick={() => d.date && setSelectedDay(d.date)}
                      className={`min-h-[90px] p-2 border-b border-r cursor-pointer transition-all ${d.other ? 'opacity-30' : ''}`}
                      style={{ borderColor: dark ? "#22242E" : "#F0F1F5", background: isSelected ? (dark ? "rgba(59,130,246,0.08)" : "#EFF4FF") : d.isToday ? (dark ? "rgba(239,68,68,0.06)" : "#FEF2F2") : "transparent" }}>
                      <span className={`text-[11px] font-bold ${d.isToday ? 'text-red-500' : dark ? 'text-gray-400' : 'text-gray-600'}`}>{d.day}</span>
                      {hasPosts && (
                        <div className="mt-1 space-y-0.5">
                          {d.posts.slice(0, 3).map((p, pi) => (
                            <div key={pi} className="flex items-center gap-1">

                          {d.posts.length > 3 && <span className="text-[8px] text-gray-400 font-bold">+{d.posts.length - 3} mais</span>}
                        </div>

                    </div>

                })}
              </div>
            </div>

            {/* Sidebar: posts do dia */}

                {selectedDay ? `Posts: ${selectedDay.split('-').reverse().join('/')}` : 'Selecione um dia'}
              </h3>
              {selectedPosts.length > 0 ? (
                <div className="space-y-3">
                  {selectedPosts.map((p) => (

                      <div className="flex items-center gap-2 mb-2 flex-wrap">

                          return pl ? (

                              <PlatformLogo id={pid} size={15} />

                          ) : null;

                        <span className="text-[9px] font-bold px-2 py-0.5 rounded-full ml-auto"
                          style={{ background: POST_STATUS[p.status]?.bg, color: POST_STATUS[p.status]?.text }}>{POST_STATUS[p.status]?.label}</span>
                      </div>
                      <p className={`text-[12.5px] font-semibold mb-1 ${dark ? "text-white" : "text-gray-900"}`}>{p.title}</p>
                      <p className="text-[11px] text-gray-400 mb-2">{p.desc}</p>
                      <p className="text-[10px] text-gray-500 mb-3">Horário: {p.time}</p>

                      <div className="flex items-center gap-2">
                        {(p.status === 'rascunho' || p.status === 'agendado') && (
                          <button onClick={() => { setEditingPost(p); setShowPostModal(true); }}
                            className="flex-1 py-1.5 rounded-lg text-[10px] font-bold border hover:bg-gray-50 transition"
                            style={{ borderColor: dark ? '#22242E' : '#E5E7EB', color: dark ? '#9CA3AF' : '#6B7280' }}>Editar</button>
                        )}
                        {(p.status === 'agendado' || p.status === 'rascunho') && (
                          <button onClick={() => publishPost(p)}
                            className="flex-1 py-1.5 rounded-lg text-[10px] font-bold bg-emerald-500 text-white hover:bg-emerald-600 transition">Publicar Agora</button>
                        )}
                        {p.status === 'publicando' && (
                          <div className="flex-1 py-1.5 text-center text-[10px] font-bold text-amber-500">Publicando...</div>
                        )}
                        {p.status === 'publicado' && (
                          <div className="flex-1 py-1.5 text-center text-[10px] font-bold text-emerald-500">Publicado</div>
                        )}
                        <button onClick={() => deletePost(p.id)}
                          className="p-1.5 rounded-lg hover:bg-red-50 transition text-gray-400 hover:text-red-500">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <p className="text-[11px] text-gray-400 italic text-center py-8">Nenhum post agendado.</p>
              )}
            </div>
          </div>

          {/* Modal Novo/Editar Post */}
          {showPostModal && (
            <EditorialPostModal dark={dark} post={editingPost} onClose={() => { setShowPostModal(false); setEditingPost(null); }} onSave={savePost} />
          )}
        </div>
      );
    }

    /* ── EDITORIAL POST MODAL ──────────────────────────────────────── */

      const [form, setForm] = useState({
        title: post?.title || '',
        desc: post?.desc || '',
        date: post?.date || new Date().toISOString().split('T')[0],
        time: post?.time || '10:00',
        platforms: post?.platforms || [],

      const togglePlatform = (id) => {
        setForm(f => ({
          ...f,
          platforms: f.platforms.includes(id) ? f.platforms.filter(p => p !== id) : [...f.platforms, id]

        <div className="modal-overlay" onClick={onClose}>

                <textarea className="modal-input" rows="2" value={form.desc} onChange={e => setForm({ ...form, desc: e.target.value })} placeholder="Conteúdo do post..." style={{ resize: 'none' }} />

              <div className="grid grid-cols-2 gap-4">
                <div>

                      <button key={pl.id} onClick={() => togglePlatform(pl.id)}
                        className="flex items-center gap-2 px-3 py-2.5 rounded-xl text-[11px] font-bold border-2 transition-all"

                          borderColor: selected ? pl.color : (dark ? '#22242E' : '#E5E7EB'),

    }
        </div>
      );
    }

    /* ── ACTIVITY MODAL ─────────────────────────────────────────────── */
    const CATEGORIES = [
      { id: 1, nome: 'Editorial', cor: '#3B82F6' },
      { id: 2, nome: 'Administrativo', cor: '#F59E0B' },
      { id: 3, nome: 'Design', cor: '#A855F7' },
    ];

    const STAGES = [
      { value: 'afazer', label: 'A Fazer' },
      { value: 'execucao', label: 'Em Execução' },

      { value: 'validando', label: 'Validando' },
      { value: 'concluido', label: 'Concluído' },
    ];

    function ActivityModal({ dark, show, onClose, onSave, editData = null }) {
      const [form, setForm] = useState({
        titulo: '', descricao: '', categoria: 1, stage: 'afazer',
        dataEntrega: new Date().toISOString().split('T')[0], dataPostagem: '',
      });

        if (editData) {
          setForm({
            titulo: editData.titulo || '',
            descricao: editData.descricao || '',
            categoria: editData.categoria || 1,
            stage: editData.stage || 'afazer',
            dataEntrega: editData.dataVencimento || new Date().toISOString().split('T')[0],
            dataPostagem: editData.dataPostagem || '',
          });
        } else {
          setForm({
            titulo: '', descricao: '', categoria: 1, stage: 'afazer',
            dataEntrega: new Date().toISOString().split('T')[0], dataPostagem: '',
          });
        }
      }, [show, editData]);

      const handleSubmit = () => {
        if (!form.titulo.trim()) return;
        onSave(form);
        onClose();

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className={`modal-content ${dark ? 'dark' : ''}`} onClick={e => e.stopPropagation()}>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="text-[10px] font-bold uppercase tracking-widest mb-1.5 block" style={{ color: dark ? '#6B7280' : '#9CA3AF' }}>Data de Entrega</label>
                  <input type="date" className="modal-input" value={form.dataEntrega} onChange={e => setForm({ ...form, dataEntrega: e.target.value })} />
                </div>
                <div>
                  <label className="text-[10px] font-bold uppercase tracking-widest mb-1.5 block" style={{ color: dark ? '#6B7280' : '#9CA3AF' }}>Data de Postagem</label>
                  <input type="date" className="modal-input" value={form.dataPostagem} onChange={e => setForm({ ...form, dataPostagem: e.target.value })} />
                </div>
              </div>

              <div>
                <label className="text-[10px] font-bold uppercase tracking-widest mb-1.5 block" style={{ color: dark ? '#6B7280' : '#9CA3AF' }}>Descrição</label>
                <textarea className="modal-input" rows="3" value={form.descricao} onChange={e => setForm({ ...form, descricao: e.target.value })} placeholder="Detalhes da atividade..." style={{ resize: 'none' }} />
              </div>
            </div>

            <div className="flex items-center justify-end gap-3 px-6 py-4 border-t" style={{ borderColor: dark ? '#22242E' : '#F0F1F5' }}>
              <button onClick={onClose} className="px-4 py-2 rounded-xl text-[12.5px] font-semibold transition hover:bg-gray-100" style={{ color: dark ? '#9CA3AF' : '#6B7280' }}>Cancelar</button>
              <button onClick={handleSubmit} className="px-5 py-2.5 rounded-xl bg-blue-500 text-white text-[12.5px] font-semibold hover:bg-blue-600 transition active:scale-[0.97] shadow-[0_4px_14px_rgba(59,130,246,0.35)]">
                {editData ? 'Salvar' : 'Criar Atividade'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ── LOGIN ──────────────────────────────────────────────────────── */
    function LoginScreen({ onLogin }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isRegister, setIsRegister] = useState(false);
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword } = window.fb;
          let cred;
          if (isRegister) {
            cred = await createUserWithEmailAndPassword(auth, email, password);
          } else {
            cred = await signInWithEmailAndPassword(auth, email, password);
          }
          onLogin(cred.user);
        } catch (err) {
          const msgs = {
            'auth/user-not-found': 'Usuário não encontrado',
            'auth/wrong-password': 'Senha incorreta',
            'auth/email-already-in-use': 'E-mail já cadastrado',
            'auth/weak-password': 'Senha muito fraca (mín. 6 caracteres)',
            'auth/invalid-email': 'E-mail inválido',
            'auth/too-many-requests': 'Muitas tentativas. Tente mais tarde.',
          };
          setError(msgs[err.code] || err.message);
        }
        setLoading(false);
      };

      return (
        <div className="login-bg">
          <div className="login-card">
            <div className="text-center mb-8">
              <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center mx-auto mb-4">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
              </div>
              <h1 className="text-[22px] font-bold text-gray-900">Flowspace</h1>
              <p className="text-[13px] text-gray-500 mt-1">{isRegister ? 'Crie sua conta' : 'Entre na sua conta'}</p>
            </div>

            {error && (
              <div className="mb-4 p-3 rounded-xl bg-red-50 border border-red-200 text-red-600 text-[12px] font-medium text-center">{error}</div>
            )}

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">E-mail</label>
                <input type="email" className="login-input" value={email} onChange={e => setEmail(e.target.value)} placeholder="seu@email.com" required />
              </div>
              <div>
                <label className="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Senha</label>
                <input type="password" className="login-input" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" required minLength={6} />
              </div>
              <button type="submit" className="login-btn" disabled={loading}>
                {loading ? 'Entrando...' : isRegister ? 'Criar Conta' : 'Entrar'}
              </button>
            </form>

            <p className="text-center mt-6 text-[12px] text-gray-500">
              {isRegister ? 'Já tem conta?' : 'Não tem conta?'}
              <button onClick={() => { setIsRegister(!isRegister); setError(''); }} className="ml-1 text-blue-500 font-bold hover:underline">
                {isRegister ? 'Entrar' : 'Criar conta'}
              </button>
            </p>
          </div>
        </div>
      );
    }

    /* ── CONFIGURAÇÕES ──────────────────────────────────────────────── */
    const API_CONFIGS = [
      {
        id: 'meta',
        name: 'Meta (Instagram + Facebook)',
        desc: 'Conecte sua conta Business do Facebook para publicar no Instagram e Facebook.',
        color: '#1877F2',
        icon: 'fb',
        fields: [
          { key: 'accessToken', label: 'Access Token', placeholder: 'EAAxxxxxxxxxx' },
          { key: 'pageId', label: 'Page ID', placeholder: '123456789' },
          { key: 'igAccountId', label: 'Instagram Account ID', placeholder: '17841400xxxxxxx' },
        ],
        docsUrl: 'https://developers.facebook.com/docs/instagram-api',
      },
      {
        id: 'linkedin',
        name: 'LinkedIn',
        desc: 'Conecte sua página da empresa para publicar posts no LinkedIn.',
        color: '#0A66C2',
        icon: 'li',
        fields: [
          { key: 'accessToken', label: 'Access Token', placeholder: 'AQxxxxxxxxxx' },
          { key: 'orgId', label: 'Organization ID', placeholder: 'urn:li:organization:xxxx' },
        ],
        docsUrl: 'https://learn.microsoft.com/en-us/linkedin/marketing/',
      },
      {
        id: 'wordpress',
        name: 'WordPress',
        desc: 'Conecte seu site WordPress para publicar artigos automaticamente.',
        color: '#21759B',
        icon: 'blog',
        fields: [
          { key: 'siteUrl', label: 'URL do Site', placeholder: 'https://seusite.com.br' },
          { key: 'username', label: 'Usuário', placeholder: 'admin' },
          { key: 'appPassword', label: 'Application Password', placeholder: 'xxxx xxxx xxxx xxxx' },
        ],
        docsUrl: 'https://developer.wordpress.org/rest-api/',
      },
    ];

    function Configuracoes({ dark }) {
      const [configs, setConfigs] = useState(() => {
        try { return JSON.parse(localStorage.getItem('api_configs') || '{}'); } catch { return {}; }
      });
      const [expandedApi, setExpandedApi] = useState(null);
      const [testResults, setTestResults] = useState({});

      const saveConfig = (apiId, data) => {
        const newConfigs = { ...configs, [apiId]: { ...configs[apiId], ...data } };
        setConfigs(newConfigs);
        localStorage.setItem('api_configs', JSON.stringify(newConfigs));
      };

      const testConnection = async (apiId) => {
        setTestResults(prev => ({ ...prev, [apiId]: 'testing' }));
        // Simula teste (em produção, faria chamada real à API)
        setTimeout(() => {
          const cfg = configs[apiId];
          const hasAllFields = API_CONFIGS.find(a => a.id === apiId)?.fields.every(f => cfg?.[f.key]);
          setTestResults(prev => ({ ...prev, [apiId]: hasAllFields ? 'success' : 'error' }));
        }, 1500);
      };

      const disconnect = (apiId) => {
        const newConfigs = { ...configs };
        delete newConfigs[apiId];
        setConfigs(newConfigs);
        localStorage.setItem('api_configs', JSON.stringify(newConfigs));
        setTestResults(prev => { const n = { ...prev }; delete n[apiId]; return n; });
      };

      return (
        <div className="space-y-6">
          <div className="rounded-2xl p-6" style={{ background: dark ? '#1A1C25' : '#FFF', boxShadow: '0 2px 12px rgba(20,20,43,0.05)' }}>
            <h2 className={`text-[16px] font-bold mb-2 ${dark ? 'text-white' : 'text-gray-900'}`}>Conexões de API</h2>
            <p className="text-[12px] text-gray-500 mb-6">Configure as integrações para publicar conteúdo diretamente do painel.</p>

            <div className="space-y-4">
              {API_CONFIGS.map(api => {
                const cfg = configs[api.id] || {};
                const isConnected = api.fields.every(f => cfg[f.key]);
                const isExpanded = expandedApi === api.id;
                const testStatus = testResults[api.id];

                return (
                  <div key={api.id} className="settings-card border" style={{ background: dark ? '#15171F' : '#FAFBFD', borderColor: dark ? '#22242E' : '#F0F1F5' }}>
                    <div className="flex items-center justify-between cursor-pointer" onClick={() => setExpandedApi(isExpanded ? null : api.id)}>
                      <div className="flex items-center gap-3">
                        <span className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: `${api.color}15` }}>
                          <PlatformLogo id={api.icon} size={20} />
                        </span>
                        <div>
                          <p className={`text-[13px] font-bold ${dark ? 'text-white' : 'text-gray-900'}`}>{api.name}</p>
                          <p className="text-[11px] text-gray-500">{api.desc}</p>
                        </div>
                      </div>
                      <div className="flex items-center gap-3">
                        {isConnected ? (
                          <span className="api-status api-connected">● Conectado</span>
                        ) : (
                          <span className="api-status api-disconnected">● Desconectado</span>
                        )}
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
                          className="text-gray-400 transition-transform" style={{ transform: isExpanded ? 'rotate(180deg)' : 'rotate(0deg)' }}>
                          <polyline points="6 9 12 15 18 9"/>
                        </svg>
                      </div>
                    </div>

                    {isExpanded && (
                      <div className="mt-5 pt-5 border-t space-y-4" style={{ borderColor: dark ? '#22242E' : '#F0F1F5' }}>
                        {api.fields.map(field => (
                          <div key={field.key}>
                            <label className="text-[10px] font-bold uppercase tracking-widest mb-1.5 block text-gray-500">{field.label}</label>
                            <input className="modal-input" type={field.key.toLowerCase().includes('token') || field.key.toLowerCase().includes('password') ? 'password' : 'text'}
                              value={cfg[field.key] || ''} onChange={e => saveConfig(api.id, { [field.key]: e.target.value })}
                              placeholder={field.placeholder} />
                          </div>
                        ))}

                        <div className="flex items-center gap-3 pt-2">
                          <button onClick={() => testConnection(api.id)}
                            className="px-4 py-2 rounded-xl text-[11px] font-bold border hover:bg-gray-50 transition flex items-center gap-2"
                            style={{ borderColor: dark ? '#22242E' : '#E5E7EB', color: dark ? '#9CA3AF' : '#6B7280' }}>
                            {testStatus === 'testing' ? (
                              <><span className="w-3 h-3 border-2 border-gray-400 border-t-transparent rounded-full animate-spin"></span> Testando...</>
                            ) : testStatus === 'success' ? (
                              <><span className="text-emerald-500">✓</span> Conexão OK</>
                            ) : testStatus === 'error' ? (
                              <><span className="text-red-500">✗</span> Falhou</>
                            ) : (
                              'Testar Conexão'
                            )}
                          </button>
                          {isConnected && (
                            <button onClick={() => disconnect(api.id)}
                              className="px-4 py-2 rounded-xl text-[11px] font-bold text-red-500 hover:bg-red-50 transition">
                              Desconectar
                            </button>
                          )}
                          <a href={api.docsUrl} target="_blank" rel="noopener"
                            className="ml-auto text-[11px] text-blue-500 hover:underline flex items-center gap-1">
                            Documentação <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                          </a>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Webhook n8n */}
          <div className="rounded-2xl p-6" style={{ background: dark ? '#1A1C25' : '#FFF', boxShadow: '0 2px 12px rgba(20,20,43,0.05)' }}>
            <h2 className={`text-[16px] font-bold mb-2 ${dark ? 'text-white' : 'text-gray-900'}`}>Webhook de Automação</h2>
            <p className="text-[12px] text-gray-500 mb-4">Configure um webhook (n8n, Make, Zapier) para receber eventos de agendamento.</p>
            <div>
              <label className="text-[10px] font-bold uppercase tracking-widest mb-1.5 block text-gray-500">URL do Webhook</label>
              <input className="modal-input" placeholder="https://seu-n8n.com/webhook/xxxx"
                value={configs.webhookUrl || ''} onChange={e => saveConfig('webhookUrl', e.target.value)} />
            </div>
            <p className="text-[10px] text-gray-400 mt-3">Quando um post for agendado, o painel enviará um POST para esta URL com os dados do post.</p>
          </div>

          {/* Conta */}
          <div className="rounded-2xl p-6" style={{ background: dark ? '#1A1C25' : '#FFF', boxShadow: '0 2px 12px rgba(20,20,43,0.05)' }}>
            <h2 className={`text-[16px] font-bold mb-4 ${dark ? 'text-white' : 'text-gray-900'}`}>Conta</h2>
            <button onClick={() => { window.fb.signOut(window.fb.auth); }}
              className="px-5 py-2.5 rounded-xl text-[12px] font-bold text-red-500 border border-red-200 hover:bg-red-50 transition flex items-center gap-2">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Sair da conta
            </button>
          </div>
        </div>
      );
    }

    /* ── APP ────────────────────────────────────────────────────────── */
    const ATIVIDADES_TABS = [
      { key: "lista", label: "Lista" },
      { key: "kanban", label: "Kanban" },
      { key: "cronograma", label: "Cronograma" },
    ];

    const CRUMBS = {
      dashboard: ["Workspace", "Dashboard"],
      projetos: ["Workspace", "Projetos"],
      lista: ["Workspace", "Atividades", "Lista"],
      kanban: ["Workspace", "Atividades", "Kanban"],
      cronograma: ["Workspace", "Atividades", "Cronograma"],
      editorial: ["Workspace", "Editorial"],
      configuracoes: ["Workspace", "Configurações"],
    };

    const TITLES = {
      dashboard: "Visão geral",
      projetos: "Projetos",
      lista: "Atividades — Lista",
      kanban: "Atividades — Kanban",
      cronograma: "Atividades — Cronograma",
      editorial: "Editorial",
      configuracoes: "Configurações",
    };

    const SUBTITLES = {
      dashboard: "Acompanhe o desempenho de todos os projetos em tempo real.",
      projetos: "Gerencie todos os projetos da equipe.",
      lista: "Gerencie tarefas, prazos e responsáveis em formato de tabela.",
      kanban: "Arraste os cards entre as colunas para atualizar o progresso.",
      cronograma: "Visualize o progresso das atividades ao longo do tempo.",
      editorial: "Publicações editoriais organizadas por data de postagem.",
      configuracoes: "Preferências e configurações do sistema.",
    };

    function App() {
      const [active, setActive] = useState("dashboard");
      const [dark, setDark] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [showModal, setShowModal] = useState(false);
      const [fbActivities, setFbActivities] = useState([]);
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      const handleSearch = (query) => setSearchQuery(query.toLowerCase());

      // Auth state listener
      useEffect(() => {
        const waitForFirebase = () => {
          if (!window.fb) { setTimeout(waitForFirebase, 200); return; }
          window.fb.onAuthStateChanged(window.fb.auth, (u) => {
            setUser(u);
            setAuthLoading(false);
          });
        };
        waitForFirebase();
      }, []);

      // Firebase load
      useEffect(() => {
        if (!user) return;
        const loadFirebase = () => {
          if (!window.fb) { setTimeout(loadFirebase, 200); return; }
          try {
            window.fb.onSnapshot(window.fb.query(window.fb.collection(window.fb.db, 'activities')), (snap) => {
              const acts = [];
              snap.forEach(d => acts.push({ ...d.data(), _fbId: d.id }));
              setFbActivities(acts);
            });
          } catch (e) { console.error('Firebase error:', e); }
        };
        loadFirebase();
      }, [user]);

      const handleSaveActivity = async (form) => {
        if (!window.fb) return;
        try {
          const data = {
            titulo: form.titulo,
            descricao: form.descricao,
            categoria: form.categoria,
            stage: form.stage,
            dataVencimento: form.dataEntrega,
            dataPostagem: form.dataPostagem || null,
            canais: [],
            progress: 0,
            checklist: [],
            attachments: [],
            createdAt: Date.now(),
            ownerUid: user?.uid || '',
          };
          await window.fb.addDoc(window.fb.collection(window.fb.db, 'activities'), data);
        } catch (e) { console.error('Erro ao salvar:', e); }
      };

      // Loading
      if (authLoading) {
        return (
          <div className="login-bg">
            <div className="text-center">
              <div className="w-10 h-10 border-4 border-white border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-white font-bold text-sm">Carregando...</p>
            </div>
          </div>
        );
      }

      // Not logged in
      if (!user) {
        return <LoginScreen onLogin={setUser} />;
      }

      const isAtividades = ["lista", "kanban", "cronograma"].includes(active);
      const activeCount = initialRows.filter(r => r.status !== "Done").length;
      const doneCount = initialRows.filter(r => r.status === "Done").length;
      const totalCount = initialRows.length;
      const donePct = totalCount ? Math.round((doneCount / totalCount) * 100) : 0;

      return (
        <div style={{ background: dark ? "#0E0F14" : "#F7F8FC", minHeight: "100vh" }}>
          <Sidebar active={active} setActive={setActive} dark={dark} activeCount={activeCount} donePct={donePct} />
          <Header dark={dark} setDark={setDark} crumbs={CRUMBS[active] || CRUMBS.dashboard} active={active} onSearch={handleSearch} onNewActivity={() => setShowModal(true)} user={user} />
          <main className="ml-[250px] pt-16 px-8 pb-10">
            <div className="pt-6 flex items-center justify-between">
              <div>
                <h1 className={`text-[22px] font-bold tracking-tight ${dark ? "text-white" : "text-gray-900"}`}>
                  {TITLES[active] || "Flowspace"}
                </h1>
                <p className="text-[13px] text-gray-400 mt-1">
                  {SUBTITLES[active] || ""}
                </p>
              </div>
              {isAtividades && (
                <div className="flex gap-1 p-1 rounded-full" style={{ background: dark ? "#1A1C25" : "#EEF0F5" }}>
                  {ATIVIDADES_TABS.map(t => (
                    <button key={t.key} onClick={() => setActive(t.key)}
                      className="px-4 py-1.5 rounded-full text-[12.5px] font-semibold transition-all"
                      style={{
                        background: active === t.key ? (dark ? "#2A2D3A" : "#FFFFFF") : "transparent",
                        color: active === t.key ? "#3B82F6" : "#9CA3AF",
                        boxShadow: active === t.key ? "0 2px 8px rgba(20,20,43,0.08)" : "none",
                      }}>
                      {t.label}
                    </button>
                  ))}
                </div>
              )}
            </div>
            <div className="mt-6">
              {active === "dashboard" && <Dashboard dark={dark} />}
              {active === "lista" && <Boards dark={dark} searchQuery={searchQuery} />}
              {active === "kanban" && <Kanban dark={dark} searchQuery={searchQuery} />}
              {active === "cronograma" && <Cronograma dark={dark} />}
              {active === "editorial" && <Calendario dark={dark} />}
              {active === "configuracoes" && <Configuracoes dark={dark} />}
              {!["dashboard", "lista", "kanban", "cronograma", "editorial", "configuracoes"].includes(active) && (
                <div className="rounded-2xl p-16 text-center" style={{ background: dark ? "#1A1C25" : "#FFFFFF", boxShadow: "0 2px 12px rgba(20,20,43,0.05)" }}>
                  <p className={`font-semibold text-[15px] ${dark ? "text-white" : "text-gray-900"}`}>Módulo "{TITLES[active]}" em construção</p>
                  <p className="text-[13px] text-gray-400 mt-1.5">Este módulo segue a mesma linguagem visual — posso detalhá-lo no próximo passo.</p>
                </div>
              )}
            </div>
          </main>
          <ActivityModal dark={dark} show={showModal} onClose={() => setShowModal(false)} onSave={handleSaveActivity} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
